services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: roomly
      POSTGRES_PASSWORD: roomly
      POSTGRES_DB: roomly
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roomly -d roomly"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
